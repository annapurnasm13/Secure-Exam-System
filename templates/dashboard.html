<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="topbar">
        <strong>Analytics Dashboard</strong>
        <nav>
            <a href="/admin">Admin</a>
            <a href="/logs">Audit Logs</a>
            <a class="danger" href="/logout">Logout</a>
        </nav>
    </header>
    <main class="page">
        <section class="stats">
            <article class="stat"><span>Total Uploads</span><strong>{{ uploads }}</strong></article>
            <article class="stat"><span>Total Downloads</span><strong>{{ downloads }}</strong></article>
            <article class="stat"><span>Total Users</span><strong>{{ users }}</strong></article>
        </section>
        <section class="panel wide">
            <h1>Recent Activity</h1>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Action</th>
                        <th>File</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody>
                    {% for log in recent_logs %}
                    <tr>
                        <td>{{ log[0] }}</td>
                        <td>{{ log[1] }}</td>
                        <td>{{ log[2] }}</td>
                        <td>{{ log[3] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
